<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskly — Smart Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body data-theme="light">

  <div class="app">


    <header class="header">
      <div class="header-left">
        <p class="app-name">Taskly</p>
        <h1 class="header-title">Today's Tasks</h1>
        <p class="header-date" id="headerDate"></p>
      </div>
      <div class="header-actions">
        <div class="status-badge">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Live</span>
        </div>
        <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle dark mode">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-number" id="statTotal">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card accent">
        <div class="stat-number" id="statActive">0</div>
        <div class="stat-label">Active</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statCompleted">0</div>
        <div class="stat-label">Done</div>
      </div>
      <div class="stat-card high">
        <div class="stat-number" id="statHigh">0</div>
        <div class="stat-label">Urgent</div>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-ring-container">
        <svg class="progress-ring" width="54" height="54" viewBox="0 0 54 54">
          <circle class="progress-ring-bg" cx="27" cy="27" r="24"/>
          <circle class="progress-ring-fill" id="progressRing" cx="27" cy="27" r="24"/>
        </svg>
        <div class="progress-percent" id="progressPercent">0%</div>
      </div>
      <div class="progress-text">
        <div class="progress-label" id="progressLabel">All tasks pending</div>
        <div class="progress-sub" id="progressSub">Complete your first task!</div>
      </div>
    </div>

    <div class="add-card">
      <div class="add-row-main">
        <input
          type="text"
          class="add-input"
          id="addInput"
          placeholder="Add a new task..."
          autocomplete="off"
          maxlength="200"
        />
        <button class="add-btn" onclick="addTask()" aria-label="Add task">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
      <div class="add-row-sub">
        <button class="expand-toggle" onclick="toggleExtras()" id="expandToggle">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
          More options
        </button>
      </div>
      <div class="add-extras" id="addExtras">
        <div class="field-group">
          <span class="field-label">Description</span>
          <input type="text" class="field-input" id="addDesc" placeholder="Optional description..." />
        </div>
        <div class="field-group" style="max-width:130px">
          <span class="field-label">Priority</span>
          <select class="field-select" id="addPriority">
            <option value="medium">⚡ Medium</option>
            <option value="high">🔴 High</option>
            <option value="low">🔵 Low</option>
          </select>
        </div>
        <div class="field-group" style="max-width:150px">
          <span class="field-label">Due Date</span>
          <input type="date" class="field-input" id="addDueDate" />
        </div>
        <div class="field-group" style="max-width:140px">
          <span class="field-label">Due Time</span>
          <input type="time" class="field-input" id="addDueTime" />
        </div>
        <div class="field-group">
          <span class="field-label">Tags (comma-separated)</span>
          <input type="text" class="field-input" id="addTags" placeholder="work, personal..." />
        </div>
      </div>
    </div>

    <div class="search-row">
      <span class="search-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input
        type="search"
        class="search-input"
        id="searchInput"
        placeholder="Search tasks..."
        oninput="handleSearch()"
        autocomplete="off"
      />
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" data-filter="active" onclick="setFilter('active')">Active</button>
      <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">Completed</button>
      <div class="filter-divider"></div>
      <button class="filter-btn" data-filter="high" onclick="setFilter('high')">🔴 High</button>
      <button class="filter-btn" data-filter="medium" onclick="setFilter('medium')">⚡ Medium</button>
      <button class="filter-btn" data-filter="low" onclick="setFilter('low')">🔵 Low</button>
      <div class="filter-divider"></div>
      <button class="filter-btn" data-filter="today" onclick="setFilter('today')">📅 Today</button>
      <button class="filter-btn" data-filter="overdue" onclick="setFilter('overdue')">⚠️ Overdue</button>
    </div>

    <div class="tools-row">
      <select class="sort-select" id="sortSelect" onchange="handleSort()">
        <option value="createdAt-desc">Latest first</option>
        <option value="createdAt-asc">Oldest first</option>
        <option value="priority-desc">Priority (High→Low)</option>
        <option value="dueDate-asc">Due date</option>
        <option value="title-asc">A → Z</option>
      </select>
      <button class="clear-completed-btn" id="clearCompletedBtn" onclick="clearCompleted()">
        Clear completed
      </button>
    </div>

    <div class="task-list" id="taskList"></div>

    <div class="deadline-banner" id="deadlineBanner" style="display:none">
      <span class="deadline-banner-icon">⏰</span>
      <span id="deadlineBannerText"></span>
    </div>

    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="2"/>
          <line x1="9" y1="12" x2="15" y2="12"/>
          <line x1="9" y1="16" x2="12" y2="16"/>
        </svg>
      </div>
      <p class="empty-title" id="emptyTitle">No tasks here</p>
      <p class="empty-sub" id="emptySub">Add your first task above!</p>
    </div>

    <div class="quote-footer">
      <p class="quote-text" id="quoteText"></p>
      <p class="quote-author" id="quoteAuthor"></p>
    </div>

  </div>

  <div class="edit-overlay" id="editOverlay" onclick="handleOverlayClick(event)">
    <div class="edit-modal">
      <h2 class="modal-title">Edit Task</h2>
      <input type="hidden" id="editTaskId" />

      <div class="modal-field">
        <label>Task Title</label>
        <input type="text" class="modal-input" id="editTitle" placeholder="Task title..." maxlength="200" />
      </div>

      <div class="modal-field">
        <label>Description</label>
        <textarea class="modal-textarea" id="editDesc" placeholder="Optional description..."></textarea>
      </div>

      <div class="modal-row">
        <div class="modal-field">
          <label>Priority</label>
          <select class="modal-select" id="editPriority">
            <option value="high">🔴 High</option>
            <option value="medium">⚡ Medium</option>
            <option value="low">🔵 Low</option>
          </select>
        </div>
        <div class="modal-field">
          <label>Due Date</label>
          <input type="date" class="modal-input" id="editDueDate" />
        </div>
        <div class="modal-field">
          <label>Due Time</label>
          <input type="time" class="modal-input" id="editDueTime" />
        </div>
      </div>

      <div class="modal-field">
        <label>Tags (comma-separated)</label>
        <input type="text" class="modal-input" id="editTags" placeholder="work, personal, urgent..." />
      </div>

      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/components/js/app.js"></script>
</body>
</html>
